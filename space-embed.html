<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morpheus Space</title>
  <style>
    :root {
      color-scheme: light;
      --bg-0: #fcfaf6;
      --bg-1: #f4ede2;
      --ink-0: #171411;
      --ink-1: rgba(86, 73, 58, 0.84);
      --ink-2: rgba(120, 104, 87, 0.62);
      --line: rgba(212, 198, 178, 0.72);
      --line-soft: rgba(220, 210, 194, 0.48);
      --card: rgba(255, 251, 246, 0.96);
      --chip: rgba(255, 248, 240, 0.96);
      --fixed-border: rgba(221, 204, 180, 0.96);
      --flash-dot: rgba(119, 101, 80, 0.88);
      --font-ui: "SF Pro Display", "Helvetica Neue", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      color: var(--ink-0);
      background:
        radial-gradient(circle at 20% 16%, rgba(255,255,255,0.95), transparent 24%),
        radial-gradient(circle at 76% 18%, rgba(241, 225, 199, 0.45), transparent 22%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
    }

    .space-root {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(rgba(184, 168, 145, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(184, 168, 145, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .space-topbar {
      position: absolute;
      left: 24px;
      top: 24px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: min(420px, calc(100vw - 48px));
    }

    .space-pill {
      padding: 12px 16px;
      border-radius: 18px;
      background: rgba(255, 251, 246, 0.94);
      border: 1px solid rgba(229, 218, 201, 0.9);
      box-shadow: 0 14px 36px rgba(34, 25, 18, 0.06);
    }

    .space-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-2);
    }

    .space-text {
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink-0);
    }

    .space-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .space-stage {
      position: absolute;
      inset: 0;
    }

    .space-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      border: 1px dashed var(--line-soft);
      pointer-events: none;
    }

    .space-ring.outer {
      opacity: 0.58;
    }

    .space-axis {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1px;
      height: 240px;
      transform: translate(-50%, -50%);
      background: linear-gradient(180deg, rgba(214, 193, 159, 0), rgba(214, 193, 159, 0.42), rgba(214, 193, 159, 0));
      pointer-events: none;
    }

    .space-node {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      transition: transform 280ms ease, opacity 220ms ease;
      will-change: transform;
    }

    .space-node.fixed {
      cursor: pointer;
    }

    .space-node.focus {
      z-index: 3;
      cursor: default;
    }

    .space-node.neighbor {
      z-index: 1;
      opacity: 0.62;
    }

    .space-node.flash {
      z-index: 2;
      cursor: default;
    }

    .space-core {
      box-shadow: 0 14px 34px rgba(37, 28, 18, 0.08);
    }

    .space-node.fixed .space-core {
      min-width: 180px;
      max-width: 280px;
      padding: 18px 20px;
      border-radius: 22px;
      border: 1px solid var(--fixed-border);
      background: var(--card);
      text-align: left;
    }

    .space-node.focus .space-core {
      min-width: 232px;
      max-width: 320px;
      padding: 22px 24px;
      box-shadow:
        0 0 0 10px rgba(241, 230, 211, 0.42),
        0 20px 44px rgba(37, 28, 18, 0.11);
    }

    .space-node.flash .space-core {
      max-width: 176px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(225, 214, 198, 0.92);
      background: var(--chip);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .space-node.flash .space-core::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--flash-dot);
      flex: 0 0 auto;
    }

    .space-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-2);
    }

    .space-title {
      margin-top: 6px;
      font-size: 18px;
      line-height: 1.35;
      color: var(--ink-0);
    }

    .space-node.neighbor .space-title {
      font-size: 15px;
    }

    .space-node.flash .space-title {
      margin-top: 0;
      font-size: 12px;
      line-height: 1.4;
      color: var(--ink-1);
    }

    .space-subtitle {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--ink-2);
    }

    .space-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
  </style>
</head>
<body>
  <div class="space-root">
    <div class="space-topbar">
      <div class="space-pill">
        <div class="space-eyebrow">Thought Field</div>
        <div id="space-caption" class="space-text">正在读取你的念头空间…</div>
      </div>
      <div class="space-pill">
        <div class="space-eyebrow">Mode</div>
        <div id="space-meta" class="space-text">点击外围定念切换焦点，先验证空间和聚焦手感。</div>
      </div>
    </div>
    <div id="space-viewport" class="space-viewport"></div>
  </div>
  <script src="/assets/js/space-embed.js?v=20260330-space-clean-01"></script>
</body>
</html>
